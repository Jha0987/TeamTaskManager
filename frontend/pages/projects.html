<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - Team Task Manager</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/projects.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container" class="sidebar-container"></div>
    
    <div class="main-content">
      <div id="navbar-container" class="top-navbar"></div>
      
      <div class="page-content">
        <div class="page-header">
          <div>
            <h1>Projects</h1>
            <p style="color: var(--color-text-muted);">Manage your workspaces</p>
          </div>
          <button id="btn-open-create-modal" class="btn btn-primary">Create Project</button>
        </div>
        
        <div id="projects-loading"></div>
        <div id="projects-list" class="projects-grid hidden"></div>
      </div>
    </div>
  </div>

  <!-- Create Project Modal -->
  <div id="create-project-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create New Project</h2>
        <button class="btn-close" id="btn-close-create-modal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="createProjectForm">
          <div class="form-group">
            <label for="projectName">Project Name *</label>
            <input type="text" id="projectName" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="projectDesc">Description</label>
            <textarea id="projectDesc" class="form-control" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancel-create">Cancel</button>
        <button type="submit" form="createProjectForm" class="btn btn-primary" id="btn-submit-project">Create Project</button>
      </div>
    </div>
  </div>

  <div id="project-members-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Manage Members - <span id="member-project-title"></span></h2>
        <button class="btn-close" id="btn-close-member-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div id="project-members-list" style="display:grid; gap:0.75rem; margin-bottom: 1rem;"></div>
        <form id="addMemberForm">
          <div class="form-group">
            <label for="memberEmail">Add Member by Email</label>
            <input type="email" id="memberEmail" class="form-control" placeholder="member@email.com" required>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancel-member-modal">Close</button>
        <button type="submit" form="addMemberForm" class="btn btn-primary">Add Member</button>
      </div>
    </div>
  </div>

  <script type="module" src="../js/projects.js"></script>
</body>
</html>
