<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks Board - Team Task Manager</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/tasks.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container" class="sidebar-container"></div>
    
    <div class="main-content">
      <div id="navbar-container" class="top-navbar"></div>
      
      <div class="page-content" style="display: flex; flex-direction: column; overflow: hidden;">
        <div class="page-header" style="flex-shrink: 0;">
          <div>
            <h1 id="project-title">Project Tasks</h1>
            <p style="color: var(--color-text-muted);">Manage tasks across columns</p>
          </div>
          <button id="btn-open-task-modal" class="btn btn-primary">Add Task</button>
        </div>
        
        <div id="tasks-loading"></div>
        
        <div id="kanban-board" class="kanban-board hidden">
          <div class="kanban-column" id="col-todo">
            <div class="column-header">
              <span style="display: flex; align-items: center; gap: 0.5rem;">
                <span style="width: 10px; height: 10px; border-radius: 50%; background-color: var(--color-gray);"></span> Todo
              </span>
              <span class="column-count" id="count-todo">0</span>
            </div>
            <div class="column-content" id="list-todo"></div>
          </div>
          
          <div class="kanban-column" id="col-inprogress">
            <div class="column-header">
              <span style="display: flex; align-items: center; gap: 0.5rem;">
                <span style="width: 10px; height: 10px; border-radius: 50%; background-color: var(--color-primary);"></span> In Progress
              </span>
              <span class="column-count" id="count-inprogress">0</span>
            </div>
            <div class="column-content" id="list-inprogress"></div>
          </div>
          
          <div class="kanban-column" id="col-done">
            <div class="column-header">
              <span style="display: flex; align-items: center; gap: 0.5rem;">
                <span style="width: 10px; height: 10px; border-radius: 50%; background-color: var(--color-success);"></span> Done
              </span>
              <span class="column-count" id="count-done">0</span>
            </div>
            <div class="column-content" id="list-done"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Create/Edit Task Modal -->
  <div id="task-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="task-modal-title">Add Task</h2>
        <button class="btn-close" id="btn-close-task-modal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="taskForm">
          <input type="hidden" id="taskId">
          <div class="form-group">
            <label for="taskTitle">Title *</label>
            <input type="text" id="taskTitle" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="taskDesc">Description</label>
            <textarea id="taskDesc" class="form-control" rows="3"></textarea>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
              <label for="taskAssignee">Assign To</label>
              <select id="taskAssignee" class="form-control">
                <option value="">Unassigned</option>
              </select>
            </div>
            <div class="form-group">
              <label for="taskDueDate">Due Date</label>
              <input type="date" id="taskDueDate" class="form-control">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancel-task">Cancel</button>
        <button type="submit" form="taskForm" class="btn btn-primary" id="btn-submit-task">Save Task</button>
      </div>
    </div>
  </div>

  <script type="module" src="../js/tasks.js"></script>
</body>
</html>
