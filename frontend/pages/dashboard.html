<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Team Task Manager</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container" class="sidebar-container"></div>
    
    <div class="main-content">
      <div id="navbar-container" class="top-navbar"></div>
      
      <div class="page-content">
        <h1 style="margin-bottom: 1.5rem;">Dashboard Overview</h1>
        
        <div id="dashboard-loading"></div>
        <div id="dashboard-content" class="hidden">
          <div class="dashboard-stats">
            <div class="card stat-card">
              <div class="stat-title">Total Tasks</div>
              <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="card stat-card">
              <div class="stat-title">Completed</div>
              <div class="stat-value" id="stat-completed" style="color: var(--color-success)">0</div>
            </div>
            <div class="card stat-card">
              <div class="stat-title">Pending</div>
              <div class="stat-value" id="stat-pending" style="color: var(--color-warning)">0</div>
            </div>
            <div class="card stat-card">
              <div class="stat-title">Overdue</div>
              <div class="stat-value" id="stat-overdue" style="color: var(--color-danger)">0</div>
            </div>
          </div>

          <div class="recent-tasks">
            <div class="recent-tasks-header">
              <h3>Recent Tasks</h3>
            </div>
            <div id="recent-tasks-list">
              <!-- Tasks will be injected here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
