<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Team Task Manager</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container" class="sidebar-container"></div>
    
    <div class="main-content">
      <div id="navbar-container" class="top-navbar"></div>
      
      <div class="page-content">
        <h1 style="margin-bottom: 1.5rem;">Dashboard Overview</h1>
        
        <div id="dashboard-loading"></div>
        <div id="dashboard-content" class="hidden">
          <div id="admin-overview" class="hidden" style="margin-bottom: 1.5rem;">
            <div class="card" style="padding: 1.25rem; margin-bottom: 1rem;">
              <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom: 1rem;">
                <div>
                  <h2 style="margin-bottom: 0.25rem;">Admin Control Center</h2>
                  <p style="color: var(--color-text-muted); margin: 0;">Manage members and monitor all projects from one place.</p>
                </div>
              </div>
              <div id="admin-users-list" style="display: grid; gap: 0.75rem;"></div>
            </div>
          </div>

          <div id="member-overview" class="hidden" style="margin-bottom: 1.5rem;">
            <div class="card" style="padding: 1.25rem;">
              <h2 style="margin-bottom: 0.25rem;">My Task Workspace</h2>
              <p style="color: var(--color-text-muted); margin: 0;">Members can track task progress and view assigned work only.</p>
            </div>
          </div>

          <div class="dashboard-stats">
            <div class="card stat-card">
              <div class="stat-title">Total Tasks</div>
              <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="card stat-card">
              <div class="stat-title">Completed</div>
              <div class="stat-value" id="stat-completed" style="color: var(--color-success)">0</div>
            </div>
            <div class="card stat-card">
              <div class="stat-title">Pending</div>
              <div class="stat-value" id="stat-pending" style="color: var(--color-warning)">0</div>
            </div>
            <div class="card stat-card">
              <div class="stat-title">Overdue</div>
              <div class="stat-value" id="stat-overdue" style="color: var(--color-danger)">0</div>
            </div>
          </div>

          <div class="recent-tasks">
            <div class="recent-tasks-header">
              <h3>Recent Tasks</h3>
            </div>
            <div id="recent-tasks-list">
              <!-- Tasks will be injected here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
